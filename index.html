<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFOMATRICULA | Carbon Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#080808] text-white font-sans min-h-screen" style="background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');">

    <div class="max-w-[550px] mx-auto p-6">
        <header class="text-center mb-8"><h1 class="text-3xl font-black italic uppercase">INFO<span class="text-blue-500">MATRICULA</span></h1></header>
        
        <div class="bg-white/5 backdrop-blur-lg border border-white/10 p-6 rounded-[2rem] shadow-2xl mb-8">
            <input id="plateInput" type="text" placeholder="6986JDY" class="w-full bg-white text-slate-900 p-4 rounded-xl text-2xl font-black uppercase italic mb-4 outline-none">
            <button onclick="consultarVehiculo()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-black uppercase transition-all">Analizar</button>
        </div>

        <div id="loader" class="hidden text-center py-10"><div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin inline-block"></div></div>

        <div id="resultsContent" class="hidden bg-white/5 backdrop-blur-lg border border-white/5 rounded-[2rem] p-6">
            <div class="grid grid-cols-2 gap-4 text-center">
                <div class="bg-white/5 p-4 rounded-xl"><p class="text-[9px] text-blue-500 uppercase">Marca</p><p id="resMake" class="font-black">---</p></div>
                <div class="bg-white/5 p-4 rounded-xl"><p class="text-[9px] text-blue-500 uppercase">Modelo</p><p id="resModel" class="font-black">---</p></div>
                <div class="col-span-2 bg-blue-600/20 p-4 rounded-xl"><p class="text-[9px] text-blue-400 uppercase">Matriculación</p><p id="resYear" class="text-xl font-black">---</p></div>
                <div class="bg-white/5 p-4 rounded-xl"><p class="text-[9px] text-gray-400 uppercase">Potencia</p><p id="resPower" class="font-black">---</p></div>
                <div class="bg-white/5 p-4 rounded-xl"><p class="text-[9px] text-gray-400 uppercase">Combustible</p><p id="resFuel" class="font-black">---</p></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
